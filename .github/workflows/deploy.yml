name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install quiz
        run: npm ci
        working-directory: quiz
      - name: Build quiz
        run: npm run build
        working-directory: quiz

      - name: Stage site
        run: |
          mkdir -p site/quiz
          cp -R quiz/dist/. site/quiz/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=./quiz/" />
              <title>Simulador de prova CTFL</title>
            </head>
            <body><a href="./quiz/">Ir para o simulador →</a></body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
